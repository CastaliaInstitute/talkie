name: Deploy Talkie GPU (Cloud Run)

# Costly: builds CUDA image and provisions GPU. Run only when deploying inference.
on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-talkie-gpu
  cancel-in-progress: true

jobs:
  deploy-gpu:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build GPU image (Cloud Build)
        run: |
          gcloud builds submit --config cloudbuild.gpu.yaml --project institute-481516 .

      - name: Deploy talkie-gpu
        run: |
          gcloud run deploy talkie-gpu \
            --image us-central1-docker.pkg.dev/institute-481516/cloud-run-source-deploy/talkie-gpu:latest \
            --region us-central1 \
            --project institute-481516 \
            --no-allow-unauthenticated \
            --no-gpu-zonal-redundancy \
            --gpu 1 \
            --gpu-type nvidia-l4 \
            --memory 32Gi \
            --cpu 8 \
            --timeout 3600 \
            --min-instances 0 \
            --max-instances 1 \
            --port 8080 \
            --set-env-vars "TALKIE_MODEL_NAME=talkie-1930-13b-it,HF_HOME=/tmp/hf"

      - name: Allow talkie-web to invoke talkie-gpu
        run: |
          gcloud run services add-iam-policy-binding talkie-gpu \
            --region=us-central1 \
            --member=serviceAccount:584409871588-compute@developer.gserviceaccount.com \
            --role=roles/run.invoker \
            --project=institute-481516

      - name: Point talkie-web at talkie-gpu (Cloud Run env, not GitHub secrets)
        run: |
          GPU_URL=$(gcloud run services describe talkie-gpu --region us-central1 --project institute-481516 --format='value(status.url)')
          gcloud run services update talkie-web \
            --region us-central1 \
            --project institute-481516 \
            --update-env-vars "TALKIE_UPSTREAM_URL=${GPU_URL}"

      - name: Mirror TALKIE_UPSTREAM_URL to repo Actions secret (optional)
        env:
          GH_TOKEN: ${{ secrets.GH_ACTIONS_SECRETS_TOKEN }}
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "Skipping secret mirror (GH_ACTIONS_SECRETS_TOKEN not set)."
            exit 0
          fi
          GPU_URL=$(gcloud run services describe talkie-gpu --region us-central1 --project institute-481516 --format='value(status.url)')
          printf '%s' "$GPU_URL" | gh secret set TALKIE_UPSTREAM_URL --repo "${{ github.repository }}"

      - name: Show GPU URL
        run: |
          echo "talkie-gpu URL:"
          gcloud run services describe talkie-gpu --region us-central1 --project institute-481516 --format='value(status.url)'
