name: Deploy Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-cloud-run
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy talkie-web
        env:
          TALKIE_UPSTREAM_URL: ${{ secrets.TALKIE_UPSTREAM_URL }}
        run: |
          set -e
          EXTRA_FLAG=()
          if [ -n "${TALKIE_UPSTREAM_URL:-}" ]; then
            EXTRA_FLAG+=(--set-env-vars="TALKIE_UPSTREAM_URL=${TALKIE_UPSTREAM_URL}")
          fi
          gcloud run deploy talkie-web \
            --source . \
            --region us-central1 \
            --project institute-481516 \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 3 \
            --concurrency 80 \
            "${EXTRA_FLAG[@]}"
